name: Daily Episode
on:
  schedule: [{cron: "0 9 * * *"}]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  produce:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install -r requirements.txt
      - name: Produce episode
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python -m src.main
      - name: Commit archive + state
        run: |
          git config user.name "bot"; git config user.email "bot@users.noreply.github.com"
          git add -f state/history.json output/feed.xml output/*.mp3 output/cover.png || true
          git commit -m "episode $(date -u +%F)" || echo "nothing to commit"
          git push || echo "push skipped"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: output
      - id: deploy
        uses: actions/deploy-pages@v4
